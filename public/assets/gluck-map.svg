<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-label="全国対応を表現した日本地図アート">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#091225"/>
      <stop offset="100%" stop-color="#0f172a"/>
