<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="工場夜景と太陽光を表現したヒーロー画像">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="60%" stop-color="#0d162a"/>
      <stop offset="100%" stop-color="#151d31"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c35a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f0c35a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c35a"/>
      <stop offset="100%" stop-color="#d8a53d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <ellipse cx="280" cy="190" rx="360" ry="130" fill="url(#glow)" filter="url(#soft)" opacity="0.56"/>

  <g opacity="0.9">
